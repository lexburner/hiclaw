name: Build Images

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free Up GitHub Actions Ubuntu Runner Disk Space 🔧
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables cross-platform emulation (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=${SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      # Tag/manual: multi-arch build + push
      - name: Build and push multi-arch images
        run: |
          make push \
            VERSION=${{ steps.meta.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }}

      - name: Tag latest (on version tag)
        if: steps.meta.outputs.is_tag == 'true'
        run: |
          make push \
            VERSION=latest \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }}

      - name: Summary
        env:
          MANAGER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/manager-agent
          WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/worker-agent
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Manager: \`${MANAGER_IMAGE}:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Worker: \`${WORKER_IMAGE}:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: \`linux/amd64, linux/arm64\`" >> $GITHUB_STEP_SUMMARY
