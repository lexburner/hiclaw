name: Integration Tests

on:
  pull_request_target:
    branches:
      - main
    paths:
      - 'manager/**'
      - '.github/workflows/test-integration.yml'
  push:
    branches:
      - main
    paths:
      - 'manager/**'
  workflow_dispatch:
    inputs:
      test_case:
        description: 'Specific test case to run (e.g., test-02-create-worker.sh). Leave empty to run create-worker test only.'
        required: false
        default: 'test-02-create-worker.sh'

env:
  # Local image tags (no registry push needed)
  MANAGER_IMAGE: hiclaw/manager-agent:ci-test
  WORKER_IMAGE: hiclaw/worker-agent:ci-test

jobs:
  # Run integration tests with local images
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      actions: read
    
    steps:
      - name: Free Up GitHub Actions Ubuntu Runner Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull base images first
      - name: Pull base images
        run: |
          docker pull higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/openclaw-base:latest

      # Build images locally (each job runs on fresh runner)
      - name: Build images
        run: |
          make build-manager build-worker VERSION=ci-test

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl unzip

      - name: Run HiClaw installation
        env:
          HICLAW_LLM_API_KEY: ${{ secrets.HICLAW_LLM_API_KEY }}
        run: |
          # Install HiClaw with local images
          HICLAW_NON_INTERACTIVE=1 \
          HICLAW_VERSION=ci-test \
          HICLAW_MOUNT_SOCKET=1 \
          HICLAW_INSTALL_MANAGER_IMAGE=${{ env.MANAGER_IMAGE }} \
          HICLAW_INSTALL_WORKER_IMAGE=${{ env.WORKER_IMAGE }} \
          ./install/hiclaw-install.sh manager

      - name: Wait for Manager to be ready
        run: |
          echo "Waiting for Manager to be healthy..."
          for i in {1..60}; do
            if docker exec hiclaw-manager curl -sf http://127.0.0.1:8001/ >/dev/null 2>&1; then
              echo "Manager console is ready!"
              # Additional wait for internal services
              sleep 10
              # Check internal services via docker exec
              if docker exec hiclaw-manager curl -sf http://127.0.0.1:6167/_matrix/client/versions >/dev/null 2>&1; then
                echo "Matrix is ready!"
                # Wait for agent initialization
                echo "Waiting 60s for Manager Agent initialization..."
                sleep 60
                exit 0
              fi
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done
          echo "Manager did not become healthy in time"
          docker logs hiclaw-manager --tail 50
          exit 1

      - name: Run integration tests
        env:
          HICLAW_LLM_API_KEY: ${{ secrets.HICLAW_LLM_API_KEY }}
        run: |
          # Enable YOLO mode for automated testing
          docker exec hiclaw-manager touch /root/manager-workspace/yolo-mode
          
          # Run specific test or all tests
          if [ -n "${{ github.event.inputs.test_case }}" ] && [ "${{ github.event.inputs.test_case }}" != "test-02-create-worker.sh" ]; then
            echo "Running specific test: ${{ github.event.inputs.test_case }}"
            ./tests/${{ github.event.inputs.test_case }}
          else
            echo "Running default test: test-02-create-worker.sh"
            ./tests/test-02-create-worker.sh
          fi

      # ============================================================
      # Metrics Comparison & PR Comment
      # ============================================================

      - name: Download previous baseline metrics
        if: github.event_name == 'pull_request_target'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            try {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'test-integration.yml',
                branch: context.payload.pull_request.base.ref,
                status: 'success',
                per_page: 1
              });
              
              if (runs.data.workflow_runs.length === 0) {
                console.log('No previous successful runs found');
                return;
              }
              
              const previousRun = runs.data.workflow_runs[0];
              console.log(`Found previous run: ${previousRun.id}`);
              
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: previousRun.id
              });
              
              const baselineArtifact = artifacts.data.artifacts.find(a => a.name.startsWith('metrics-baseline-'));
              if (!baselineArtifact) {
                console.log('No baseline artifact found');
                return;
              }
              
              console.log(`Found baseline: ${baselineArtifact.name}`);
              
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: baselineArtifact.id,
                archive_format: 'zip'
              });
              
              fs.writeFileSync('baseline.zip', Buffer.from(download.data));
              execSync('mkdir -p baseline-metrics && unzip -o baseline.zip -d baseline-metrics', { stdio: 'inherit' });
              console.log('Baseline downloaded');
            } catch (err) {
              console.log(`Error: ${err.message}`);
            }

      - name: Generate metrics comparison and post PR comment
        if: github.event_name == 'pull_request_target'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          # Check if metrics library exists
          if [ ! -f "tests/lib/agent-metrics.sh" ]; then
            echo "No metrics library found, skipping comparison"
            exit 0
          fi
          
          source tests/lib/agent-metrics.sh
          
          # Generate current summary
          echo "Generating current metrics..."
          CURRENT=$(generate_metrics_summary "02-create-worker")
          
          # Load baseline if exists
          BASELINE=""
          if [ -f "baseline-metrics/metrics-summary.json" ]; then
            echo "Loading baseline..."
            BASELINE=$(cat baseline-metrics/metrics-summary.json)
          fi
          
          # Compare and generate report
          echo "Comparing..."
          COMPARISON=$(compare_metrics_with_baseline "$CURRENT" "$BASELINE")
          REPORT=$(generate_comparison_markdown "$COMPARISON")
          
          # Save for artifacts
          mkdir -p tests/output
          echo "$COMPARISON" > tests/output/metrics-comparison.json
          echo "$REPORT" > tests/output/metrics-report.md
          
          # Post PR comment
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          # Find existing comment
          EXISTING=$(gh api "repos/$REPO/issues/$PR_NUM/comments" \
            --jq '.[] | select(.body | startswith("## 📊 CI Metrics Report")) | .id' | head -1)
          
          if [ -n "$EXISTING" ]; then
            echo "Updating comment..."
            gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING" -f body="$REPORT"
          else
            echo "Creating comment..."
            gh api --method POST "repos/$REPO/issues/$PR_NUM/comments" -f body="$REPORT"
          fi
          
          echo "Done!"

      - name: Save baseline metrics for future runs
        if: always()
        run: |
          mkdir -p baseline-output
          
          if [ -f "tests/lib/agent-metrics.sh" ] && [ -d "tests/output" ] && ls tests/output/metrics-*.json 1>/dev/null 2>&1; then
            source tests/lib/agent-metrics.sh
            generate_metrics_summary "02-create-worker" > baseline-output/metrics-summary.json
            echo "Saved baseline"
          else
            echo '{"error": "no metrics", "timestamp": "'$(date -Iseconds)'"}' > baseline-output/metrics-summary.json
          fi

      - name: Upload baseline metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-baseline-${{ github.sha }}
          path: baseline-output/
          retention-days: 30

      - name: Collect test artifacts
        if: always()
        run: |
          mkdir -p test-artifacts
          
          # Copy test output files
          if [ -d "tests/output" ]; then
            cp -r tests/output/* test-artifacts/ 2>/dev/null || true
          fi
          
          # Collect Manager logs
          docker logs hiclaw-manager > test-artifacts/manager.log 2>&1 || true
          docker exec hiclaw-manager cat /var/log/hiclaw/manager-agent.log > test-artifacts/manager-agent.log 2>&1 || true
          
          # Collect Worker logs (if any)
          for container in $(docker ps -a --format '{{.Names}}' | grep hiclaw-worker); do
            docker logs "$container" > "test-artifacts/${container}.log" 2>&1 || true
          done

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.sha }}
          path: test-artifacts/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          make uninstall || true
          docker system prune -af || true

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Manager Image: \`${{ env.MANAGER_IMAGE }}\` (local build)" >> $GITHUB_STEP_SUMMARY
          echo "- Worker Image: \`${{ env.WORKER_IMAGE }}\` (local build)" >> $GITHUB_STEP_SUMMARY
          echo "- No registry push required" >> $GITHUB_STEP_SUMMARY
